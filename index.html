<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>onyxu</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    position: relative;
    text-align: center;
  }

  canvas#bgCanvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 0;
    width: 100%;
    height: 100%;
  }

  #placeholder {
    font-size: 48px;
    font-weight: bold;
    position: relative;
    margin-top: 40px;
    text-align: center;
    z-index: 10;
    background: linear-gradient(90deg, #ff6ec7, #00f0ff, #fffd38, #ff6ec7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-size: 300% 300%;
    animation: gradientMove 4s ease infinite, popUp 2s ease forwards;
  }

  @keyframes popUp {
    0% { transform: translateY(100px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  @keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  #socials {
    margin-top: 30px;
    text-align: center;
    z-index: 10;
  }

  #socials a {
    display: block;
    margin: 20px 0;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 2px;
    text-decoration: none;
    background: linear-gradient(90deg, #ff6ec7, #00f0ff, #fffd38, #ff6ec7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-size: 300% 300%;
    animation: gradientMove 4s ease infinite, fadeIn 1s forwards;
    opacity: 0;
  }

  #socials a:nth-child(1) { animation-delay: 0.5s; }

  @keyframes fadeIn {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .homie-section {
    margin-top: 40px;
    text-align: center;
    z-index: 10;
    color: white;
  }

  .homie-section h2 {
    font-family: 'Arial Black', sans-serif;
    font-weight: bold;
    font-size: 24px;
    margin-bottom: 10px;
  }

  .homie-section a {
    font-family: 'Arial Black', sans-serif;
    font-weight: bold;
    font-size: 20px;
    color: white;
    text-decoration: underline;
  }

  .spotify-embed {
    margin-top: 20px;
    width: 100%;
    max-width: 500px;
    border-radius: 12px;
  }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div id="placeholder">My Socials</div>

<div id="socials">
  <a href="https://www.tiktok.com/@xxac37xyt" target="_blank">TIKTOK</a>
</div>

<div class="homie-section">
  <h2>My homie</h2>
  <a href="https://open.spotify.com/artist/554d1AhywrvmcbGjm1qAZK?si=lgjreIVgTuyPZ_a62oud_g" target="_blank">Check them out on Spotify</a>

  <iframe class="spotify-embed" data-testid="embed-iframe" style="border-radius:12px" 
          src="https://open.spotify.com/embed/artist/5OlChR2cUiTnFZ7dzrWx6M?utm_source=generator" 
          width="100%" height="352" frameBorder="0" allowfullscreen="" 
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy">
  </iframe>
</div>

<audio id="music" autoplay loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
  const audio = document.getElementById('music');
  audio.volume = 0.2;

  // ===== Background dots & lines =====
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let width = canvas.width = window.innerWidth;
  let height = canvas.height = window.innerHeight;

  const numDots = 80;
  const dots = [];

  function random(min, max) { return Math.random() * (max - min) + min; }

  for (let i=0;i<numDots;i++){
    dots.push({
      x: random(0, width),
      y: random(0, height),
      vx: random(-0.3,0.3),
      vy: random(-0.3,0.3),
      radius: random(1,3)
    });
  }

  function animate(){
    ctx.clearRect(0,0,width,height);

    for(let i=0;i<dots.length;i++){
      const d1 = dots[i];
      for(let j=i+1;j<dots.length;j++){
        const d2 = dots[j];
        const dist = Math.hypot(d1.x-d2.x, d1.y-d2.y);
        if(dist<120){
          ctx.strokeStyle = 'rgba(255,255,255,0.05)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(d1.x,d1.y);
          ctx.lineTo(d2.x,d2.y);
          ctx.stroke();
        }
      }
    }

    for(let i=0;i<dots.length;i++){
      const d = dots[i];
      d.x += d.vx;
      d.y += d.vy;
      if(d.x<0 || d.x>width) d.vx*=-1;
      if(d.y<0 || d.y>height) d.vy*=-1;
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      ctx.beginPath();
      ctx.arc(d.x,d.y,d.radius,0,Math.PI*2);
      ctx.fill();
    }

    requestAnimationFrame(animate);
  }
  animate();

  window.addEventListener('resize',()=>{
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  });
</script>
</body>
</html>
