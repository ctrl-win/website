<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>onyxu</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #111;
    position: relative;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  canvas#bgCanvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 0;
    width: 100%;
    height: 100%;
  }

  /* Enter button */
  #enterButton {
    padding: 20px 40px;
    font-size: 24px;
    cursor: pointer;
    background: #222;
    color: white;
    border: 2px solid white;
    border-radius: 8px;
    transition: 0.3s;
    z-index: 10;
  }

  #enterButton:hover {
    background: white;
    color: black;
  }

  /* Placeholder text */
  #placeholder {
    display: none;
    font-size: 48px;
    font-weight: bold;
    position: relative;
    animation: popUp 2s ease forwards;
    margin-top: 40px;
    text-align: center;
    z-index: 10;
    background: linear-gradient(90deg, #ff6ec7, #00f0ff, #fffd38, #ff6ec7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-size: 300% 300%;
    animation: gradientMove 4s ease infinite, popUp 2s ease forwards;
  }

  @keyframes popUp {
    0% { transform: translateY(100px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  @keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Social links with animated gradient */
  #socials {
    display: none;
    margin-top: 30px;
    text-align: center;
    z-index: 10;
  }

  #socials a {
    display: block;
    margin: 10px 0;
    font-size: 28px;
    font-weight: 900;
    color: black;
    letter-spacing: 2px;
    text-decoration: none;
    font-family: Arial, sans-serif;
    background: linear-gradient(90deg, #ff6ec7, #00f0ff, #fffd38, #ff6ec7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-size: 300% 300%;
    animation: gradientMove 4s ease infinite;
  }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<!-- Enter button -->
<div id="enterButton">Enter My Website</div>

<!-- Placeholder text -->
<div id="placeholder">My Socials</div>

<!-- Social links -->
<div id="socials">
  <a href="https://www.tiktok.com/@xxac37xyt" target="_blank">TIKTOK</a>
  <a href="https://www.youtube.com/@xxac37xyt" target="_blank">YOUTUBE</a>
</div>

<!-- Hidden music -->
<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
  const button = document.getElementById('enterButton');
  const placeholder = document.getElementById('placeholder');
  const socials = document.getElementById('socials');
  const audio = document.getElementById('music');

  button.addEventListener('click', () => {
    button.style.display = 'none';
    placeholder.style.display = 'block';
    socials.style.display = 'block';
    audio.volume = 0.2;
    audio.play().catch(() => {});
  });

  // ===== Background dots & lines =====
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let width = canvas.width = window.innerWidth;
  let height = canvas.height = window.innerHeight;

  const numDots = 80;
  const dots = [];

  function random(min, max) { return Math.random() * (max - min) + min; }

  for (let i=0;i<numDots;i++){
    dots.push({
      x: random(0, width),
      y: random(0, height),
      vx: random(-0.3,0.3),
      vy: random(-0.3,0.3),
      radius: random(1,3)
    });
  }

  function animate(){
    ctx.clearRect(0,0,width,height);

    // Draw lines
    for(let i=0;i<dots.length;i++){
      const d1 = dots[i];
      for(let j=i+1;j<dots.length;j++){
        const d2 = dots[j];
        const dist = Math.hypot(d1.x-d2.x, d1.y-d2.y);
        if(dist<120){
          ctx.strokeStyle = 'rgba(255,255,255,0.05)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(d1.x,d1.y);
          ctx.lineTo(d2.x,d2.y);
          ctx.stroke();
        }
      }
    }

    // Draw dots
    for(let i=0;i<dots.length;i++){
      const d = dots[i];
      d.x += d.vx;
      d.y += d.vy;
      if(d.x<0 || d.x>width) d.vx*=-1;
      if(d.y<0 || d.y>height) d.vy*=-1;
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      ctx.beginPath();
      ctx.arc(d.x,d.y,d.radius,0,Math.PI*2);
      ctx.fill();
    }

    requestAnimationFrame(animate);
  }
  animate();

  window.addEventListener('resize',()=>{
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  });

</script>
</body>
</html>
